name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: "true"
      IMAGE_NAME: ghcr.io/deloz/context7-pool

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Show Rust toolchain
        run: rustup show

      - name: Check Rust formatting
        run: cargo fmt --manifest-path backend/Cargo.toml --check

      - name: Run Rust clippy
        run: cargo clippy --manifest-path backend/Cargo.toml --locked -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path backend/Cargo.toml --locked

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify release version
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z, got $GITHUB_REF_NAME"
            exit 1
          fi

          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(
            cargo metadata --manifest-path backend/Cargo.toml --format-version 1 --no-deps \
              | jq -r '.packages[] | select(.name == "contextpool") | .version'
          )"

          if [ "$cargo_version" != "$tag_version" ]; then
            echo "backend/Cargo.toml version ($cargo_version) does not match tag $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$TAG" \
            --notes "Docker image: \`$IMAGE_NAME:$TAG\`" \
            --generate-notes
