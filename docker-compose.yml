services:
  postgres:
    image: postgres:latest
    container_name: contextpool-postgres
    environment:
      POSTGRES_DB: contextpool
      POSTGRES_USER: contextpool
      POSTGRES_PASSWORD: contextpool
    ports:
      - "45432:5432"
    volumes:
      - contextpool_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextpool -d contextpool"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: contextpool-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONTEXTPOOL_HTTP_ADDR: ":42421"
      CONTEXTPOOL_DATABASE_URL: postgres://contextpool:contextpool@postgres:5432/contextpool
      CONTEXTPOOL_FRONTEND_DIST: /app/frontend/dist
    ports:
      - "42431:42421"

volumes:
  contextpool_pg_data:
